<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts — Small Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/contacts.css">
    <script src="js/login.js" defer></script>
    <script src="js/register.js" defer></script>
    <script src="js/contact.js" defer></script>
</head>

<body>

  <!-- --------------------Simple color background in contacts.css #06040a - deepest background -------------------- -->

   <!-- ---Uperleft Day/Time--- -->
  <section class="header">
    <div class="clock">
      <span id="date"></span>
      <span id="time"></span>
    </div>

    <!-- ---Center Logo--- -->
    <img src="images/dragon_logo.png" alt="Lampsm Logo" class="logo">

    <!-- ---Upperright logout button, run doLogout() at contacts.js-- -->
    <nav class="navigation">
      <a href="#" onclick="doLogout(event)">Log Out</a>
    </nav>
  </section>

  <template id="alert-template">
    <div class="alert-box">
      <div class="alert">
        <ion-icon></ion-icon>
        <br />
        <span></span>
      </div>
    </div>
  </template>

  <!-- Add Contact Card -->
  <div class="card">
    <h3>Add Contact</h3>

    <!-- First and Last Name -->
    <form method="POST" action="#">
      <div class="name-row">
        <div class="field">
          <label for="first_name">First Name</label>
          <input required type="text" id="first_name" name="first_name" placeholder="First Name" />
        </div>
        <div class="field">
          <label for="last_name">Last Name</label>
          <input required type="text" id="last_name" name="last_name" placeholder="Last Name" />
        </div>
      </div>

      <!-- user Email -->
      <div class="field">
        <label for="email">Email</label>
        <input required type="email" id="email" name="email" placeholder="email@gmail.com" />
      </div>

      <!-- user Phone number -->
      <div class="field">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="(000) 000-0000" />
      </div>

      <!-- ---run addContact() at contacts.js-- -->
      <button type="button" onclick="addContact()">Add Contact</button>
    </form>
  </div>

  <!-- Contacts Table Card -->
  <div class="card">
    <h3>Contacts</h3>
    <input id="search" type="text" placeholder="Search for Contacts..." onkeyup="loadContacts()" />

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="contacts"></tbody>
      </table>
    </div>
  </div>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</body>
</html>
