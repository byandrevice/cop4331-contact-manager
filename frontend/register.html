<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/login.js" defer></script>
    <script src="js/register.js" defer></script>
    <script src="js/contact.js" defer></script>
</head>

<body>
    <!-- --------------------Simple color background in register.css /* slate-900 → slate-800 */ -------------------- -->
    
    <!-- --------------------Register Box-------------------- -->
    <div id="register-box" class="card">

        <div class="card-header">
            <h1 class="card-title">Small Project — Contacts</h1>
            <h3 class="card-sub">Create an Account</h3>
        </div>

        <!-- --------------------Invalid notification-------------------- -->
        <div id="register-invalid-box" class="error-box" hidden>
            <p id="field-missing"  hidden>One or more fields missing or too short</p>
            <p id="password-match" hidden>Passwords do not match</p>
        </div>

        <!-- --------------------Use user information to create account. Api and Datatbase Require-------------------- -->
        <div class="form-fields">
            <div class="name-row">
                <input type="text"     id="reg_first_name" placeholder="First Name" required />
                <input type="text"     id="reg_last_name"  placeholder="Last Name" />
            </div>
            <input type="text"     id="reg_username"        placeholder="Username" required />
            <input type="password" id="reg_password"        placeholder="Password" required />
            <input type="password" id="reg_confirm_password" placeholder="Confirm Password" required />
          </div>
           <!-- --------------------Password Require-------------------- -->
          <div id="explanationUser">
            <h3>Password must contain the following:</h3>
            <p id="passLen" class="invalid"> 8 to 32 characters </p>
            <p id="passLett" class="invalid"> At least one letter </p>
            <p id="passNum" class="invalid"> At least one number </p>
            <p id="passSpec" class="invalid"> At least one special character</p>
        </div>

        <!-- --------------------User next steps-------------------- -->
        <div class="form-actions">
            <button id="reg_reset"  type="reset">Reset</button>
            <button id="reg_submit" type="submit">Submit</button>
        </div>

        <!-- --------------------Back to login page-------------------- -->
        <div class="login-register">
            Already have an account? <a href="login.html" class="login-link">Login</a>
        </div>

    </div>
</body>

</html>
