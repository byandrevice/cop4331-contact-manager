<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts — Small Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/contacts.css">
    <script src="js/login.js" defer></script>
    <script src="js/register.js" defer></script>
    <script src="js/contact.js" defer></script>
    <script src="js/api.js" defer></script>
</head>

<body>
  <main class="card">
    <div class="card-header">
      <h1 class="card-title">Create Account</h1>
      <p class="card-sub">Join us today</p>
    </div>

    <!-- This form will eventually call api/register.php through register.js -->
    <div id="signupResult" class="error-box" style="display: none;"></div>

    <form id="registerForm">
      <div class="form-fields">
        <div class="name-row">
          <div>
            <input type="text" id="firstName" placeholder="First Name" required>
          </div>
          <div>
            <input type="text" id="lastName" placeholder="Last Name" required>
          </div>
        </div>

        <div>
          <input type="text" id="username" placeholder="Username" required>
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required>
          <p class="input-info">Password must be 8+ characters and contain both letters and numbers.</p>
        </div>
      </div>

      <div class="form-actions">
        <button type="reset" id="reg_reset">Reset</button>
        <button type="submit" id="reg_submit">Register</button>
      </div>
    </form>

    <p class="login-register">
      Already have an account?
      <a href="login.html" class="login-link">Log in</a>
    </p>
  </main>
</body>
</html>
