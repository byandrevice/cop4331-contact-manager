<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* ── Variables (matches login.css exactly) ── */
        :root {
            --void:        #06040a;
            --obsidian:    #0d0b14;
            --stone:       #161221;
            --border:      #2a1f3d;
            --border-hot:  #5c1a1a;
            --crimson:     #9b1c1c;
            --crimson-lit: #c0392b;
            --gold:        #c9a343;
            --ash:         #a89bb0;
            --parchment:   #e8e0d5;
            --font-head:   'Cinzel', serif;
            --font-body:   'Crimson Text', serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            color: var(--parchment);
            background: var(--void);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(100,20,20,0.12) 0%, transparent 70%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        }

        /* ── Card ── */
        .error-container {
            width: 100%;
            max-width: 420px;
            background: var(--obsidian);
            border: 1px solid var(--border);
            border-left: 3px solid var(--crimson);
            border-radius: 4px;
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.02),
                inset 0 1px 0 rgba(255,255,255,0.03),
                0 24px 60px rgba(0,0,0,0.7),
                -4px 0 20px rgba(155,28,28,0.08);
            animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── 404 Number ── */
        .error-code {
            font-family: var(--font-head);
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            color: var(--crimson);
            letter-spacing: 0.1em;
            text-shadow:
                0 0 30px rgba(155,28,28,0.5),
                0 0 60px rgba(155,28,28,0.2);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 30px rgba(155,28,28,0.5), 0 0 60px rgba(155,28,28,0.2); }
            50%       { text-shadow: 0 0 40px rgba(192,57,43,0.7), 0 0 80px rgba(155,28,28,0.35); }
        }

        /* ── Divider ── */
        .divider {
            width: 100%;
            border: none;
            border-top: 1px solid var(--border);
            position: relative;
        }

        .divider::after {
            content: '✦';
            position: absolute;
            top: -0.55rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            color: var(--crimson);
            background: var(--obsidian);
            padding: 0 0.4rem;
        }

        /* ── Title ── */
        .error-title {
            font-family: var(--font-head);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* ── Message ── */
        .error-message {
            font-size: 1.1rem;
            color: var(--ash);
            font-style: italic;
            line-height: 1.6;
        }

        /* ── Button ── */
        .home-link {
            display: inline-block;
            font-family: var(--font-head);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--parchment);
            background: var(--crimson);
            border: 1px solid var(--crimson-lit);
            border-radius: 3px;
            padding: 0.65rem 1.75rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(155,28,28,0.3);
            margin-top: 0.5rem;
        }

        .home-link:hover {
            background: var(--crimson-lit);
            box-shadow: 0 4px 24px rgba(192,57,43,0.45);
            transform: translateY(-1px);
        }

        .home-link:active {
            transform: translateY(0);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--void); }
        ::-webkit-scrollbar-thumb { background: var(--border-hot); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--crimson); }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">404</div>
        <hr class="divider">
        <p class="error-title">Page Not Found</p>
        <p class="error-message">
            The page you're looking for has vanished into the dark.
        </p>
        <a href="/index.html" class="home-link">Return Home</a>
    </div>

</body>
</html>
