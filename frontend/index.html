<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts — TouchBase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/login.js" defer></script>
</head>

<body>
    <div class="showcase">
        <img src="images/church.png" alt="Showcase Graphic">
    </div>

    <main class="auth-panel" aria-label="Login Session Container">

        <div class="clock">
            <div id="date"></div>
            <div id="time"></div>
        </div>

        <div class="card">

           <div class="theme-switcher">
    <img src="images/logo_night.png" alt="Theme switcher" class="logo" id="themeToggle">
    <span class="theme-hint">Tap emblem to switch theme</span>
</div>

<h2 class="card-title">Login to TouchBase</h2>
            <form action="#" method="POST" onsubmit="event.preventDefault();">
                <div class="form-fields">
                    <input type="text" id="login_username" placeholder="Username" aria-label="Username" required
                            pattern="(?=.*[a-zA-Z])[a-zA-Z0-9-_]{3,18}$" />
                    <input type="password" id="login_password" placeholder="Password" aria-label="Password" required
                            pattern="(?=.*\d)(?=.*[A-Za-z])(?=.*[!@#$%^&*]).{8,32}" />
                </div>

                 <button id="login_submit" type="button" onclick="doLogin();"> 
                    Submit
                </button>
            </form>

            <div class="signup-link">
                Don't have an account?
                <a href="register.html">Sign up</a>
            </div>

            <div id="login_message"></div>

        </div>
    </main>
</body>
</html>
