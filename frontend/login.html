<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/login.js" defer></script>
    <script src="js/register.js" defer></script>
</head>

<body class="bg-white min-h-screen flex font-sans antialiased text-black">

    <div class="hidden lg:block lg:w-4/5 relative bg-neutral-900">
        <img 
            src="images/showcase.png" 
            alt="Showcase Graphic" 
            class="w-full h-full object-cover"
        >
    </div>

    <div class="w-150 flex-none flex flex-col justify-center items-center p-6 bg-slate-950 relative">

        <div class="clock absolute top-4 right-4 text-white bg-black/40 backdrop-blur px-3 py-1.5 rounded-lg text-sm z-10 text-right">
            <div id="date" class="text-slate-400 text-xs"></div>
            <div id="time" class="font-medium"></div>
        </div>

        <div class="w-full max-w-sm bg-slate-900/80 backdrop-blur border border-slate-700 rounded-2xl shadow-2xl p-8 flex flex-col gap-6">
        
            <img 
                src="images/dragon_logo.png"
                alt="Lampsm Logo" 
                class="w-11 h-11 self-center"
            >
            
            <h2 class="text-xl font-semibold text-white text-center">
                Login to Small Project
            </h2>
            
            <form class="space-y-4" action="#" method="POST" onsubmit="event.preventDefault();">
                <div class="flex flex-col gap-3">
                    <input 
                        type="text" id="login_username" placeholder="Username"
                        class="w-full rounded-lg bg-slate-800 border border-slate-600 px-4 py-2 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150" 
                        required
                    >
                    <input 
                        type="password" id="login_password" placeholder="Password"
                        class="w-full rounded-lg bg-slate-800 border border-slate-600 px-4 py-2 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150" 
                        required
                    >
                </div>
      
                <button 
                    id="login_submit" type="button" onclick="doLogin();"
                    class="w-full text-white rounded-lg bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 py-2.5 font-semibold transition shadow-md hover:shadow-lg mt-2"
                >
                    Submit
                </button>
            </form>
      
            <div class="text-center text-sm text-slate-400">
                Don't have an account? 
                <a href="register.html" class="text-indigo-400 hover:text-indigo-300 font-medium underline transition ml-1">Sign up</a>
            </div>
      
            <div id="login_message" class="min-h-[1.25rem] text-center text-sm text-red-400"></div>

        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric'
            });
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>

</body>
</html>
