<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
    <script src="js/login.js" defer></script>
    <script src="js/register.js" defer></script>
</head>

<body>

    <div class="showcase">
        <img src="images/showcase.png" alt="Showcase Graphic">
    </div>

    <div class="auth-panel">

        <div class="clock">
            <div id="date"></div>
            <div id="time"></div>
        </div>

        <div class="card">

            <img src="images/dragon_logo.png" alt="Lampsm Logo" class="logo">

            <h2 class="card-title">Login to Small Project</h2>

            <form action="#" method="POST" onsubmit="event.preventDefault();">
                <div class="form-fields">
                    <input type="text" id="login_username" placeholder="Username" required>
                    <input type="password" id="login_password" placeholder="Password" required>
                </div>

                <button id="login_submit" type="button" onclick="doLogin();">
                    Submit
                </button>
            </form>

            <div class="signup-link">
                Don't have an account?
                <a href="register.html">Sign up</a>
            </div>

            <div id="login_message"></div>

        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric'
            });
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>

</body>
</html>
